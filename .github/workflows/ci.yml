name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Tests (run on every push and PR) ──────────────────────────────

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm test -- --run
      - run: pnpm build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen
      - run: uv run pytest

  # ── Bundle + Release (only on v* tags) ────────────────────────────

  bundle:
    name: Bundle (${{ matrix.platform }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [frontend, backend]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
          - os: macos-latest
            platform: macos-arm64
          - os: macos-13
            platform: macos-x64
          - os: ubuntu-latest
            platform: linux-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Pin Python 3.12
        run: uv python install 3.12
      - name: Set UV Python preference
        run: echo "UV_PYTHON=3.12" >> $GITHUB_ENV
        shell: bash
      - name: Build bundle
        run: uv run --no-project python scripts/bundle.py
      - uses: actions/upload-artifact@v4
        with:
          name: openvoca-${{ matrix.platform }}
          path: dist/openvoca-*

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [bundle]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' \) -exec cp {} release-assets/ \;
          ls -lh release-assets/
      - name: Extract changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## v${VERSION}$/,/^## v/" CHANGELOG.md | head -n -1 > release-notes.md
          cat release-notes.md
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: release-assets/*
          draft: false
          prerelease: false
